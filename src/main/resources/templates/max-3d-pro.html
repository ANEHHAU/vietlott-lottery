<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 3D Pro AI Predictor</title>
    <style>
        :root { --primary: #3b82f6; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e2937);
            color: #e2e8f0;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        h1 { text-align: center; font-size: 2.8rem; margin-bottom: 10px; text-shadow: 0 0 20px var(--primary); }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }

        .container { display: flex; gap: 25px; max-width: 1400px; margin: 0 auto; }
        .left {
            width: 48%; background: rgba(15,23,42,0.95); border-radius: 20px;
            padding: 20px; height: 720px; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #334155;
        }
        .round {
            background: #1e2937; margin-bottom: 10px; padding: 12px;
            border-radius: 10px; border-left: 5px solid #334155;
            font-size: 0.9rem;
        }

        /* Màu cho 6 vị trí */
        .idx0 { color: #ef4444; }
        .idx1 { color: #f97316; }
        .idx2 { color: #eab308; }
        .idx3 { color: #22c55e; }
        .idx4 { color: #3b82f6; }
        .idx5 { color: #a855f7; }

        .right { width: 52%; display: flex; flex-direction: column; gap: 25px; }
        .box {
            background: white; color: #0f172a; border-radius: 20px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* Hiển thị 2 nhóm 3 số */
        .result-container { display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
        .result-group { display: flex; gap: 10px; }
        .separator {
            font-size: 2.5rem; font-weight: bold; color: #94a3b8; line-height: 1;
        }
        .ball {
            width: 64px; height: 64px;
            background: linear-gradient(145deg, #3b82f6, #1d4ed8);
            color: white; font-size: 2rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(59,130,246,0.5), inset 0 4px 10px rgba(255,255,255,0.3);
            animation: popIn 0.6s ease forwards;
        }
        @keyframes popIn { 0%{transform:scale(0.3)} 100%{transform:scale(1)} }

        button {
            display: block; margin: 0 auto 30px; padding: 16px 48px;
            font-size: 1.4rem; font-weight: bold;
            background: linear-gradient(90deg, #3b82f6, #93c5fd);
            color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px #3b82f6; transition: all 0.3s;
        }
        button:hover { transform: translateY(-4px); box-shadow: 0 0 50px #3b82f6; }
        button:disabled { opacity: 0.7; cursor: not-allowed; }

        .progress-container { margin: 15px 0; }
        .progress-bar { height: 12px; background: #334155; border-radius: 9999px; overflow: hidden; }
        .progress-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #3b82f6, #93c5fd);
            transition: width 0.3s;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { background: #f1f5f9; padding: 6px 10px; text-align: left; }
        td { padding: 5px 10px; border-bottom: 1px solid #e2e8f0; }
        .freq-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    </style>
</head>
<body>

<h1>🎲 Max 3D Pro AI Predictor</h1>
<p class="subtitle">Mô phỏng AI realtime • 6 chữ số từ 0–9 • 2 bộ số may mắn</p>

<button id="generateBtn">🚀 TẠO BỘ SỐ MAY MẮN</button>

<div class="container">
    <div class="left" id="rounds">
        <div style="margin-bottom:15px">
            <h3>📊 Quá trình mô phỏng AI</h3>
            <span id="roundCount" style="background:#3b82f6;color:white;padding:4px 12px;border-radius:30px;font-size:0.9rem;font-weight:bold;">0 vòng</span>
        </div>
    </div>

    <div class="right">
        <div class="box">
            <h3 style="margin:0 0 20px 0;text-align:center;color:#0f172a;">Kết quả dự đoán</h3>
            <div id="result" class="result-container"></div>
            <p style="text-align:center;color:#64748b;font-size:0.85rem;margin-top:16px;">
                Bộ 1: 3 số đầu &nbsp;|&nbsp; Bộ 2: 3 số sau
            </p>
        </div>

        <div class="box">
            <h3 style="margin:0 0 15px 0;color:#0f172a;">Tần suất theo vị trí</h3>
            <div id="tables" class="freq-grid"></div>
        </div>
    </div>
</div>

<div style="max-width:1400px;margin:20px auto;background:#1e2937;border-radius:20px;padding:20px;color:white">
    <div class="progress-container">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <small>Tiến độ mô phỏng</small>
            <span id="percentText">0%</span>
        </div>
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
    </div>
</div>

<script>
    const btn = document.getElementById("generateBtn");
    let eventSource = null;

    function resetUI() {
        document.getElementById("rounds").innerHTML = `
      <div style="margin-bottom:15px">
        <h3>📊 Quá trình mô phỏng AI</h3>
        <span id="roundCount" style="background:#3b82f6;color:white;padding:4px 12px;border-radius:30px;font-size:0.9rem;font-weight:bold;">0 vòng</span>
      </div>`;
        document.getElementById("result").innerHTML = "";
        document.getElementById("tables").innerHTML = "";
        document.getElementById("progressFill").style.width = "0%";
        document.getElementById("percentText").textContent = "0%";
    }

    function generate() {
        btn.disabled = true;
        btn.innerHTML = `🔄 ĐANG MÔ PHỎNG...`;
        resetUI();

        eventSource = new EventSource("/api/max-3d-pro/predict");

        eventSource.onmessage = (e) => console.log("SSE default:", e.data);

        eventSource.addEventListener("round", (e) => {
            const r = JSON.parse(e.data);
            const div = document.createElement("div");
            div.className = "round";

            // Hiển thị dạng: Vòng 1 | [0]5 [1]3 [2]7 - [3]2 [4]8 [5]1
            let nums = r.numbers.map((n, i) =>
                `<span class="idx${i}">[${i}]<b>${n}</b></span>`
            ).join(' ');

            div.innerHTML = `<b>Vòng ${r.round}</b> &nbsp; ${nums}`;
            const roundsDiv = document.getElementById("rounds");
            roundsDiv.appendChild(div);
            roundsDiv.scrollTop = roundsDiv.scrollHeight;
            document.getElementById("roundCount").textContent = r.round + " vòng";
        });

        eventSource.addEventListener("progress", (e) => {
            const p = parseInt(e.data);
            document.getElementById("progressFill").style.width = p + "%";
            document.getElementById("percentText").textContent = p + "%";
        });

        eventSource.addEventListener("ping", () => {});

        eventSource.addEventListener("complete", (e) => {
            const data = JSON.parse(e.data);

            // Hiển thị kết quả: 3 số đầu | 3 số sau
            const nums = data.result;
            document.getElementById("result").innerHTML = `
        <div class="result-group">
          ${[0,1,2].map(i => `<div class="ball">${nums[i]}</div>`).join('')}
        </div>
        <div class="separator">·</div>
        <div class="result-group">
          ${[3,4,5].map(i => `<div class="ball">${nums[i]}</div>`).join('')}
        </div>
      `;

            // Bảng tần suất dạng grid 3 cột
            let gridHTML = "";
            for (let i = 0; i < 6; i++) {
                const freq = data.freq[i];
                const entries = Object.entries(freq)
                    .map(([k,v]) => [parseInt(k), v])
                    .sort((a,b) => a[0]-b[0]);

                gridHTML += `
          <div>
            <h4 style="margin:0 0 8px;color:#0f172a;font-size:0.9rem">
              Vị trí ${i} <span style="color:#3b82f6">(→ chọn: ${nums[i]})</span>
            </h4>
            <table>
              <tr><th>Số</th><th>Lần</th></tr>
              ${entries.map(([digit, count]) => `
                <tr style="${digit === nums[i] ? 'background:#eff6ff;font-weight:bold' : ''}">
                  <td>${digit}</td><td>${count}</td>
                </tr>`).join('')}
            </table>
          </div>`;
            }
            document.getElementById("tables").innerHTML = gridHTML;

            eventSource.close();
            btn.disabled = false;
            btn.innerHTML = `🚀 TẠO BỘ SỐ MAY MẮN`;
        });

        eventSource.onerror = () => {
            eventSource.close();
            alert("❌ Mất kết nối SSE");
            btn.disabled = false;
            btn.innerHTML = `🚀 TẠO BỘ SỐ MAY MẮN`;
        };
    }

    btn.addEventListener("click", generate);
</script>
</body>
</html>
